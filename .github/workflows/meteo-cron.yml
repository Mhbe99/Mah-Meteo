name: Meteo Cron Job

on:
  schedule:
    - cron: '*/22 * * * *'  # Toutes les 22 minutes
  workflow_dispatch:

jobs:
  run-meteo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Wake up Render API
        run: |
          echo "🔄 Réveillage du service Render..."
          curl -s https://mah-meteo.onrender.com/health || true
          sleep 3
      
      - name: Run meteo script
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          GITHUB_ACTIONS: 'true'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python meteo_open.py

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan gh-pages
          git reset
          git add dashboard_meteo.html carte_tv.html exports/risques_meteo.xlsx -f
          git commit -m "Update météo data"
          git push origin gh-pages -f
