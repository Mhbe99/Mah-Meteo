name: Meteo Cron Job

on:
  workflow_dispatch:  # Déclenché par cron-job.org via API GitHub

concurrency:
  group: meteo-cron
  cancel-in-progress: true

jobs:
  run-meteo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate required secrets
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          set -e
          for key in SENDER_EMAIL SMTP_FROM RECEIVER_EMAILS BREVO_API_KEY EMAIL_PROVIDER JWT_SECRET RENDER_URL; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done
          if [ -z "$RENDER_API_TOKEN" ]; then
            echo "Warning: RENDER_API_TOKEN not set (optional, service-token flow used by default)."
          fi
          echo "All required secrets are present."
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Wake up Render API
        run: |
          echo "🔄 Réveillage du service Render..."
          curl -s https://mah-meteo.onrender.com/health || true
          sleep 3
      
      - name: Run meteo script
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          GITHUB_ACTIONS: 'true'
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BREVO_SMTP_FALLBACK: ${{ secrets.BREVO_SMTP_FALLBACK }}
          BREVO_SMTP_FALLBACK_ON_TIMEOUT: ${{ secrets.BREVO_SMTP_FALLBACK_ON_TIMEOUT }}
          DISABLE_EMAIL_WEEKENDS: ${{ secrets.DISABLE_EMAIL_WEEKENDS }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            export DATABASE_URL="sqlite:///./meteo_saas.db"
          fi
          python meteo_open.py

      - name: Weekly report fallback (Monday 08:00 Paris)
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BREVO_SMTP_FALLBACK: ${{ secrets.BREVO_SMTP_FALLBACK }}
          BREVO_SMTP_FALLBACK_ON_TIMEOUT: ${{ secrets.BREVO_SMTP_FALLBACK_ON_TIMEOUT }}
          REPORT_REQUIRE_RENDER: 'true'
          ALLOW_LOCAL_REPORT_FALLBACK: 'false'
          GITHUB_ACTIONS: 'true'
          DISABLE_EMAIL_WEEKENDS: ${{ secrets.DISABLE_EMAIL_WEEKENDS }}
        run: |
          PARIS_DOW="$(TZ=Europe/Paris date +%u)"
          PARIS_HOUR="$(TZ=Europe/Paris date +%H)"
          if [ "$PARIS_DOW" = "1" ] && [ "$PARIS_HOUR" = "08" ]; then
            echo "Running weekly report fallback from meteo cron"
            python rapport_hebdomadaire.py --force-send
          else
            echo "Skip weekly report fallback (Paris dow=$PARIS_DOW hour=$PARIS_HOUR)"
          fi

      - name: Upload publication artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meteo-public-assets
          if-no-files-found: error
          path: |
            dashboard_meteo.html
            carte_tv.html
            exports/risques_meteo.xlsx

  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs: run-meteo
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download publication artifacts
        uses: actions/download-artifact@v4
        with:
          name: meteo-public-assets
          path: site

      - name: Deploy to GitHub Pages
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true

          DASHBOARD_FILE="$(find site -type f -name 'dashboard_meteo.html' | head -n 1)"
          CARTE_FILE="$(find site -type f -name 'carte_tv.html' | head -n 1)"
          XLSX_FILE="$(find site -type f -name 'risques_meteo.xlsx' | head -n 1)"

          if [ -z "$DASHBOARD_FILE" ] || [ -z "$CARTE_FILE" ]; then
            echo "Missing expected required publication files in artifact"
            find site -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "$DASHBOARD_FILE" ./dashboard_meteo.html
          cp "$CARTE_FILE" ./carte_tv.html
          if [ -n "$XLSX_FILE" ]; then
            mkdir -p exports
            cp "$XLSX_FILE" ./exports/risques_meteo.xlsx
            git add exports/risques_meteo.xlsx
          fi
          git add dashboard_meteo.html carte_tv.html
          if git diff --cached --quiet; then
            echo "No publication changes to deploy"
            exit 0
          fi
          git commit -m "Update météo data"
          git push origin gh-pages -f
