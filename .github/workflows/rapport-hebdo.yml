name: Rapport Hebdomadaire

on:
  schedule:
    - cron: '0 6 * * 1'  # Lundi 8h00 Paris (6h UTC été)
  workflow_dispatch:      # Déclenchement manuel possible

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate required secrets
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          set -e
          for key in SENDER_EMAIL SMTP_FROM RECEIVER_EMAILS BREVO_API_KEY EMAIL_PROVIDER RENDER_URL JWT_SECRET; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done
          if [ -z "$RENDER_API_TOKEN" ]; then
            echo "Warning: RENDER_API_TOKEN not set (optional for weekly report)."
          fi
          echo "All required secrets are present."

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rapport hebdomadaire
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BREVO_SMTP_FALLBACK: ${{ secrets.BREVO_SMTP_FALLBACK }}
          BREVO_SMTP_FALLBACK_ON_TIMEOUT: ${{ secrets.BREVO_SMTP_FALLBACK_ON_TIMEOUT }}
          REPORT_REQUIRE_RENDER: 'true'
          ALLOW_LOCAL_REPORT_FALLBACK: 'false'
          GITHUB_ACTIONS: 'true'
          DISABLE_EMAIL_WEEKENDS: ${{ secrets.DISABLE_EMAIL_WEEKENDS }}
        run: python rapport_hebdomadaire.py --force-send
