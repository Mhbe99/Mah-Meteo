# FICHIER HISTORIQUE — NE PAS ACTIVER
# Remplacé par meteo-cron.yml + cron-job.org
name: Mise à jour météo

# ⛔ DÉSACTIVÉ le 1er avril 2026 — doublon avec meteo-cron.yml
# Garder uniquement le déclenchement manuel pour urgences
on:
  # schedule:
  #   - cron: '0 * * * *'  # DÉSACTIVÉ - doublon
  workflow_dispatch:      # Permet le déclenchement manuel uniquement

jobs:
  update-meteo:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl
      
    - name: Wake up Render API
      run: |
        echo "🔄 Réveillage du service Render..."
        curl -s https://mah-meteo.onrender.com/health || true
        sleep 3
        
    - name: Update environment variables
      env:
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        RENDER_URL: ${{ secrets.RENDER_URL }}
        RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        GITHUB_ACTIONS: 'true'
      run: |
        echo "SMTP_USER=$SMTP_USER" >> $GITHUB_ENV
        echo "SMTP_PASS=$SMTP_PASS" >> $GITHUB_ENV
        echo "RECEIVER_EMAIL=$RECEIVER_EMAIL" >> $GITHUB_ENV
        echo "RENDER_URL=$RENDER_URL" >> $GITHUB_ENV
        echo "RENDER_API_TOKEN=$RENDER_API_TOKEN" >> $GITHUB_ENV
        echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_ENV
        echo "TOMTOM_API_KEY=$TOMTOM_API_KEY" >> $GITHUB_ENV
        echo "SENDER_EMAIL=$SENDER_EMAIL" >> $GITHUB_ENV
        echo "GMAIL_PASSWORD=$GMAIL_PASSWORD" >> $GITHUB_ENV
        echo "RECEIVER_EMAILS=$RECEIVER_EMAILS" >> $GITHUB_ENV
        echo "GITHUB_ACTIONS=true" >> $GITHUB_ENV
        
    - name: Run meteo script
      run: python meteo_open.py
        
    - name: Deploy to GitHub Pages
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git checkout --orphan gh-pages
        git reset
        git add dashboard_meteo.html carte_tv.html exports/risques_meteo.xlsx -f
        git commit -m "Update météo data"
        git push origin gh-pages -f
