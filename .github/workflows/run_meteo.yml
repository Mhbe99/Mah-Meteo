name: Mise à jour météo

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les heures
  workflow_dispatch:      # Permet le déclenchement manuel

jobs:
  update-meteo:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl
        
    - name: Update environment variables
      env:
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        echo "SMTP_USER=$SMTP_USER" >> $GITHUB_ENV
        echo "SMTP_PASS=$SMTP_PASS" >> $GITHUB_ENV
        echo "RECEIVER_EMAIL=$RECEIVER_EMAIL" >> $GITHUB_ENV
        
    - name: Run meteo script
      run: python meteo_open.py
        
    - name: Deploy to GitHub Pages
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git checkout --orphan gh-pages
        git reset
        git add dashboard_meteo.html carte_tv.html exports/risques_meteo.xlsx -f
        git commit -m "Update météo data"
        git push origin gh-pages -f